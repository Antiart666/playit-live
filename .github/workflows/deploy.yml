name: 'Deploy PlayIt Live'

on:
  push:
    branches:
      - main
    paths:
      - 'library/**'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'package.json'
      - 'next.config.js'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint code
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🏗️ Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}

      - name: ✅ Build verification successful
        if: success()
        run: |
          echo "✅ Build successful!"
          echo "Vercel handles production deployment from main."

      - name: 📝 Publish deployment summary
        if: success()
        run: |
          {
            echo "## Deploy status"
            echo "- CI build/lint in GitHub Actions: success"
            echo "- Production deploy source: Vercel (triggered from main)"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: ❌ Deployment failed notification
        if: failure()
        run: echo "❌ Deployment failed. Check logs above for details."
